services:
  backend:
    build: ./backend-fastapi
    restart: always
    ports:
      - "8000:8000"
    env_file:
      - ./backend-fastapi/.env
    command: uvicorn main:app --host 0.0.0.0 --port 8000

  frontend:
    build: ./front_proyecto
    restart: always
    ports:
      - "80:80"
    depends_on:
      - backend

  mongodb:
    image: mongo:4.4
    restart: always
    ports:
      - "27017:27017"
    environment:
      MONGO_INITDB_ROOT_USERNAME: CodeCrusaders
      MONGO_INITDB_ROOT_PASSWORD: CodeCrusaders2526
    volumes:
      - mongo_data:/data/db
volumes:
  mongo_data:
